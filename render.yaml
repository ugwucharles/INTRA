# render.yaml
# Blueprint for INTRA on Render

version: "1"

services:
  # -----------------------------------
  # 1. NestJS Backend API
  # -----------------------------------
  - type: web
    name: intra-api
    env: node
    plan: free
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npm run start:prod
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: intra-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000

  # -----------------------------------
  # 2. Next.js Frontend
  # -----------------------------------
  - type: web
    name: intra-web
    env: node
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    startCommand: cd frontend && npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://intra-api.onrender.com
      - key: NODE_ENV
        value: production

# -----------------------------------
# 3. PostgreSQL Database
# -----------------------------------
databases:
  - name: intra-db
    plan: free
    databaseName: intra
    user: intra
